  <style>
    .placeholder {
      background: white;
      padding: 40px;
      border-radius: 12px;
      display: inline-block;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
    }

    .gallery img {
        width: 100%;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s;
    }

    .gallery img:hover {
        transform: scale(1.05);
    }
  </style>

</head>
